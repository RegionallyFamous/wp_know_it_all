# railway.scraper.toml — Scraper service
# In Railway dashboard: create a second service in the same project,
# point it at this repo, and override the config file path to this file.

"$schema" = "https://railway.com/railway.schema.json"

[build]
builder        = "DOCKERFILE"
dockerfilePath = "packages/scraper/Dockerfile.scraper"
watchPatterns  = [
  "packages/scraper/src/**",
  "packages/shared/src/**",
  "packages/scraper/package.json",
  "packages/shared/package.json",
  "packages/scraper/Dockerfile.scraper",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "package.json"
]

[deploy]
startCommand         = "node packages/scraper/dist/index.js"
# Weekly Sunday at 3:00 AM UTC
cronSchedule         = "0 3 * * 0"
restartPolicyType    = "NEVER"
