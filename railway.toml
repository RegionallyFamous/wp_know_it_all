# railway.toml — Server service
# Scraper service uses packages/scraper/railway.scraper.toml (configure separately in Railway dashboard)

"$schema" = "https://railway.com/railway.schema.json"

[build]
builder        = "DOCKERFILE"
dockerfilePath = "packages/server/Dockerfile"
watchPatterns  = [
  "packages/server/src/**",
  "packages/shared/src/**",
  "packages/server/package.json",
  "packages/shared/package.json",
  "packages/server/Dockerfile",
  "railway.toml",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "package.json",
  "tsconfig.base.json"
]

[deploy]
startCommand            = "node packages/server/dist/index.js"
healthcheckPath         = "/health"
healthcheckTimeout      = 120
restartPolicyType       = "ON_FAILURE"
restartPolicyMaxRetries = 3
